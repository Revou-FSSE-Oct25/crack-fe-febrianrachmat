name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://crack-be-febrianrachmat-production.up.railway.app
      JWT_SECRET: ci-test-jwt-secret-min-32-chars-long

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        id: unit_tests
        run: npm run test:cov

      - name: Publish coverage summary
        if: steps.unit_tests.outcome == 'success'
        run: node scripts/print-coverage-summary.mjs

      - name: Upload coverage report
        if: steps.unit_tests.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          retention-days: 14

      - name: Build
        run: npm run build
